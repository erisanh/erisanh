# yazi — TUI file manager (plan.theme.md §11)
# Background comes from the terminal (ghostty = #0f120e), so yazi stays on the
# single desktop hue. 3-pane layout: parent · current · preview.

[mgr]
ratio          = [1, 3, 4]
sort_by        = "natural"
sort_sensitive = false
sort_reverse   = false
sort_dir_first = true
linemode       = "size"
show_hidden    = false
show_symlink   = true
scrolloff      = 5

[preview]
wrap        = "no"
tab_size    = 4
max_width   = 1000
max_height  = 1000
image_delay = 30

[opener]
edit = [
	{ run = 'nvim "$@"', desc = "nvim", block = true, for = "unix" },
]
open = [
	{ run = 'xdg-open "$@"', desc = "Open", for = "linux" },
]

[open]
rules = [
	{ mime = "inode/directory", use = [ "edit", "open", "reveal" ] },
	{ mime = "text/*", use = [ "edit", "reveal" ] },
	{ mime = "image/*", use = [ "open", "reveal" ] },
	{ mime = "video/*", use = [ "open", "reveal" ] },
	{ mime = "application/pdf", use = [ "open", "reveal" ] },
	{ name = "*", use = [ "open", "edit", "reveal" ] },
]
