# yazi theme (plan.theme.md §11 / §9.2)
# Single dark hue #0f120e (from the terminal) + accent #95CDF7 for selection,
# matching the desktop. Accents: blue #95CDF7 · purple #CEC0E8 · green #1BCA4B
# · pink #DD5C82 · yellow #e0af68. Elevated cells use a near-#0f120e tone.

[mgr]
cwd = { fg = "#95CDF7" }

# hovered / active row -> accent fill (like the launcher selection)
hovered         = { fg = "#0f120e", bg = "#95CDF7" }
preview_hovered = { underline = true }

# find
find_keyword  = { fg = "#1BCA4B", italic = true }
find_position = { fg = "#CEC0E8", bg = "reset", italic = true }

# marker column (copy / cut / select / marked)
marker_copied   = { fg = "#1BCA4B", bg = "#1BCA4B" }
marker_cut      = { fg = "#DD5C82", bg = "#DD5C82" }
marker_marked   = { fg = "#95CDF7", bg = "#95CDF7" }
marker_selected = { fg = "#CEC0E8", bg = "#CEC0E8" }

# count badges
count_copied   = { fg = "#0f120e", bg = "#1BCA4B" }
count_cut      = { fg = "#0f120e", bg = "#DD5C82" }
count_selected = { fg = "#0f120e", bg = "#CEC0E8" }

# tabs
tab_active   = { fg = "#0f120e", bg = "#95CDF7" }
tab_inactive = { fg = "#B7C9D9", bg = "#1a1f19" }
tab_width    = 1

# borders between panes — subtle hairline on the #0f120e base
border_symbol = "│"
border_style  = { fg = "#3a4036" }

[mode]
normal_main = { fg = "#0f120e", bg = "#95CDF7", bold = true }
normal_alt  = { fg = "#95CDF7", bg = "#1a1f19" }
select_main = { fg = "#0f120e", bg = "#1BCA4B", bold = true }
select_alt  = { fg = "#1BCA4B", bg = "#1a1f19" }
unset_main  = { fg = "#0f120e", bg = "#CEC0E8", bold = true }
unset_alt   = { fg = "#CEC0E8", bg = "#1a1f19" }

[status]
separator_open  = ""
separator_close = ""
perm_type  = { fg = "#95CDF7" }
perm_read  = { fg = "#e0af68" }
perm_write = { fg = "#DD5C82" }
perm_exec  = { fg = "#1BCA4B" }
perm_sep   = { fg = "#5b6155" }

[select]
border   = { fg = "#95CDF7" }
active   = { fg = "#CEC0E8" }
inactive = {}

[input]
border   = { fg = "#95CDF7" }
title    = {}
value    = {}
selected = { reversed = true }

[pick]
border   = { fg = "#95CDF7" }
active   = { fg = "#CEC0E8", bold = true }
inactive = {}

[confirm]
border  = { fg = "#95CDF7" }
title   = { fg = "#95CDF7" }
content = {}
list    = {}
btn_yes = { fg = "#0f120e", bg = "#1BCA4B", bold = true }
btn_no  = { fg = "#0f120e", bg = "#DD5C82" }

[completion]
border = { fg = "#95CDF7" }

[tasks]
border  = { fg = "#95CDF7" }
title   = {}
hovered = { fg = "#CEC0E8", underline = true }

[help]
on      = { fg = "#1BCA4B" }
run     = { fg = "#CEC0E8" }
hovered = { fg = "#0f120e", bg = "#95CDF7", bold = true }
footer  = { fg = "#B7C9D9", bg = "#1a1f19" }

[filetype]
rules = [
	{ mime = "image/*", fg = "#CEC0E8" },
	{ mime = "video/*", fg = "#e0af68" },
	{ mime = "audio/*", fg = "#e0af68" },
	{ mime = "application/zip", fg = "#DD5C82" },
	{ mime = "application/gzip", fg = "#DD5C82" },
	{ mime = "application/x-tar", fg = "#DD5C82" },
	{ mime = "application/x-bzip", fg = "#DD5C82" },
	{ mime = "application/x-7z-compressed", fg = "#DD5C82" },
	{ mime = "application/pdf", fg = "#DD5C82" },
	{ name = "*", fg = "#cfd6cb" },
	{ name = "*/", fg = "#95CDF7" },
]
