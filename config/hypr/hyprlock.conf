# BACKGROUND — flat solid #0f120e (plan §9.2): single dark hue, no image/blur.
# (No blur pass needed for a flat color -> lighter on GPU at lock time.)
background {
    monitor =
    color = rgb(0f120e)
    blur_passes = 0
    # To use an image again, set `path = ~/Pictures/...` and bump blur_passes.
}

# GENERAL
general {
    no_fade_in = false
    grace = 0
    disable_loading_bar = false
}

# INPUT FIELD
input-field {
    monitor =
    size = 250, 60
    outline_thickness = 2
    dots_size = 0.2 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.2 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    outer_color = rgba(0, 0, 0, 0)
    inner_color = rgba(15, 18, 14, 0.55)
    font_color = rgb(200, 200, 200)
    fade_on_empty = false
    font_family = SF Pro Display Bold
    placeholder_text = <i><span foreground="##ffffff99">Enter Password</span></i>
    hide_input = false
    position = 0, -225
    halign = center
    valign = center
}

# Time
label {
    monitor =
    text = cmd[update:1000] echo "<span>$(date +"%H:%M")</span>"
    color = rgba(216, 222, 233, 0.70)
    font_size = 95
    font_family = SF Pro Display Bold
    position = 0, 240
    halign = center
    valign = center
}

# Day-Month-Date
label {
    monitor =
    text = cmd[update:1000] echo -e "$(date +"%A, %d %B")"
    color = rgba(216, 222, 233, 0.70)
    font_size = 20
    font_family = SF Pro Display Bold
    position = 0, 150
    halign = center
    valign = center
}

# Desktop Environment
image {
    monitor =
    path = ~/Pictures/profile/hyprland.png
    size = 20
    border_size = 0
    position = -50, 50
    halign = right
    valign = bottom
}

# Profie-Photo
image {
    monitor =
    path = ~/Pictures/profile/bird_profile.png
    border_color = rgba(255, 255, 255, 0)
    border_size = 2
    size = 120
    rounding = -1
    rotate = 0
    reload_time = -1
    reload_cmd =
    position = 0, -70
    halign = center
    valign = center
}

# USER
label {
    monitor =
    text = $USER
    color = rgba(216, 222, 233, 0.70)
    font_size = 15
    font_family = SF Pro Display Bold
    position = 0, -150
    halign = center
    valign = center
}

# CURRENT SONG
label {
    monitor =
    text = cmd[update:1000] echo "$(~/.config/hypr/scripts/songdetail.sh)"
    color = rgba(255, 255, 255, 0.7)
    font_size = 10
    font_family = JetBrains Mono Nerd, SF Pro Display Bold
    position = 0, 50
    halign = center
    valign = bottom
}

label {
    monitor =
    text = cmd[update:1000] echo "$(~/.config/hypr/scripts/battery.sh)"
    color = $foreground
    font_size = 12
    font_family = JetBrains Mono Nerd, SF Pro Display Bold
    position = -45, -10
    halign = right
    valign = top
}

label {
    monitor =
    text = cmd[update:1000] echo "$(~/.config/hypr/scripts/network_status.sh)"
    color = $foreground
    font_size = 12
    font_family = JetBrains Mono Nerd
    position = -20, -10
    halign = right
    valign = top
}
