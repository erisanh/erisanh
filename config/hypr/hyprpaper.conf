# plan.theme.md §4 / §9.2 — FLAT dark desktop, single hue #0f120e.
# No textured/patterned wallpaper. The flat #0f120e base is drawn by Hyprland
# itself via `misc:background_color = rgb(0f120e)` (see compositor.lua), so we
# intentionally do NOT set a wallpaper here — hyprpaper paints nothing and the
# uniform dark base shows through (also lighter on GPU/RAM).
#
# To go back to an image wallpaper later, uncomment a block below.

# wallpaper {
#     monitor = eDP-1
#     path = ~/Pictures/wall/leaves.jpg
#     fit_mode = cover
# }

# wallpaper {
#     monitor = HDMI-A-1
#     path = ~/Pictures/macos1.jpg
#     fit_mode = cover
# }
